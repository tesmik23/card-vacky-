<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats preview card</title>
<link rel="stylesheet" href="style.css">
</head>
 
<body>
 
<div class="card">
 
  <div class="image">
    <picture>
      <source media="(max-width:768px)" srcset="image-header-mobile.jpg">
      <img src="image-header-desktop.jpg" alt="office meeting">
    </picture>
  </div>
 
  <div class="content">
 
    <h1>Get <span>insights</span> that help your business grow.</h1>
 
    <p>
      Discover the benefits of data analytics and make better decisions
      regarding revenue, customer experience, and overall efficiency.
    </p>
 
    <div class="stats">
 
      <div>
        <h2>10k+</h2>
        <span>COMPANIES</span>
      </div>
 
      <div>
        <h2>314</h2>
        <span>TEMPLATES</span>
      </div>
 
      <div>
        <h2>12M+</h2>
        <span>QUERIES</span>
      </div>
 
    </div>
 
  </div>
 
</div>
 
</body>
</html>
